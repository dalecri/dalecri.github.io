<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cristobal D'Alessio | Project Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500&family=Silkscreen:wght@400;700&family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- Light Theme (Pale Morel) --- */
            --bg-color: #dcd6ce; 
            --card-paper: #ece7e0;
            --card-content-bg: #c9c3ba;
            --text-main: #36322e;
            --text-muted: #736d65;
            --text-accent: #9c958b;
            --border-color: rgba(54, 50, 46, 0.1);
            --shadow-color: rgba(54, 50, 46, 0.1);
            --slider-bg: #c9c2b8;
            --highlight: rgba(255, 255, 255, 0.6);
            
            --pack-step: 20px;
            --spread-gap: 600px;
            --pop-z: 180px;
        }

        [data-theme="dark"] {
            /* --- Dark Theme (Deep Morel) --- */
            --bg-color: #292623; 
            --card-paper: #36322e;
            --card-content-bg: #1c1a18;
            --text-main: #e8e2d9;
            --text-muted: #a39b91;
            --text-accent: #756f67;
            --border-color: rgba(232, 226, 217, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --slider-bg: #4a453f;
            --highlight: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* --- UI OVERLAYS --- */
        .header-left {
            position: absolute;
            top: 50px;
            left: 60px;
            z-index: 100;
        }

        .header-left .name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 42px;
            line-height: 0.9;
            color: var(--text-main);
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .header-left .stats {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 18px;
            color: var(--text-muted);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .header-right {
            position: absolute;
            top: 50px;
            right: 60px;
            z-index: 100;
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 3px;
            text-transform: lowercase;
            display: flex;
            align-items: center;
        }

        .theme-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            margin-right: 16px;
            opacity: 0.6;
            transition: opacity 0.2s ease, transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* --- FILTERING UI --- */
        .filter-panel {
            position: absolute;
            bottom: 50px;
            right: 60px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .filter-btn {
            background: none;
            border: none;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.2s ease;
            text-transform: lowercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn.active {
            opacity: 1;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .filter-btn sup {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
        }

        /* --- ISOMETRIC SCENE --- */
        .viewport {
            position: absolute;
            inset: 0;
            top: 35%; 
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2200px;
        }

        .scene {
            transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .timeline {
            transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .ground-line {
            position: absolute;
            width: 1px;
            background: var(--border-color);
            left: 0;
            transform: translateX(-50%);
        }

        .label {
            position: absolute;
            left: 0;
            transform-style: preserve-3d;
            transform-origin: bottom center;
            color: var(--text-accent);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 2px;
            font-family: 'Silkscreen', cursive;
            text-transform: uppercase;
            white-space: nowrap;
            transition: top 0.65s, transform 0.65s;
        }

        /* --- CARD STYLING --- */
        .card-container {
            position: absolute;
            left: 0;
            transform-style: preserve-3d;
            transform-origin: bottom center;
            transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1), z-index 0.65s;
            cursor: pointer;
        }

        .card-frame {
            width: 100%;
            height: 100%;
            position: relative;
            background: var(--card-paper);
            padding: 16px;
            border-radius: 11px;
            box-shadow: 
                0 4px 6px -1px var(--shadow-color), 
                0 2px 4px -1px var(--shadow-color),
                inset 0 1px 0 var(--highlight);
            transform-origin: bottom center;
            transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease, background-color 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-content {
            position: relative;
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px;
            background: var(--card-content-bg); 
            transition: filter 0.6s ease, opacity 0.6s ease, background-color 0.4s ease;
            box-shadow: inset 0 2px 4px var(--shadow-color);
        }

        .card-preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .card-info {
            width: 100%;
            padding-top: 14px;
            text-align: center;
        }

        .card-title {
            font-size: 13px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 2px;
            transition: color 0.4s ease;
        }

        .card-desc {
            font-size: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-style: italic;
            color: var(--text-muted);
            transition: color 0.4s ease;
        }

        /* --- ACTIVE STATE --- */
        .card-container.active .card-frame {
            box-shadow: 
                0 20px 25px -5px var(--shadow-color), 
                0 10px 10px -5px var(--shadow-color);
            transform: scale(1.2);
        }

        .anchor-elements {
            position: absolute;
            inset: 0;
            pointer-events: none;
            transform-style: preserve-3d;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .card-container.active .anchor-elements {
            opacity: 1;
        }

        .plus-icon {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--card-paper);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-muted);
            box-shadow: 0 4px 6px var(--shadow-color);
            transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease;
        }

        .anchor-line {
            position: absolute;
            left: 50%;
            width: 1px;
            border-left: 1px dashed var(--text-accent);
            transform: translateX(-50%);
            opacity: 0.5;
        }

        .focused-label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            color: var(--text-muted);
            font-size: 9px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- ADJUST VIEW PANEL --- */
        .controls-panel {
            position: absolute;
            bottom: 40px;
            left: 60px;
            z-index: 200;
        }

        .controls-card {
            background: var(--card-paper);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px var(--shadow-color);
            border: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
            gap: 14px;
            width: 240px;
            margin-bottom: 12px;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .controls-card.open { display: flex; }

        .control-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label-group {
            display: flex;
            justify-content: space-between;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 0.8px;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: var(--slider-bg);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            transition: background-color 0.4s ease;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--text-main);
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.4s ease;
        }

        .adjust-btn {
            background: var(--card-paper);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px var(--shadow-color);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 12px;
            color: var(--text-main);
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }
        
        .adjust-btn:hover {
            transform: translateY(-2px);
        }

        /* --- MOBILE VIEW ADAPTATIONS --- */
        @media (max-width: 768px) {
            body {
                overflow-y: auto !important;
                height: auto !important;
                min-height: 100vh;
            }
            .header-left {
                position: relative !important;
                top: 0 !important;
                left: 0 !important;
                padding: 30px 20px 10px 20px !important;
            }
            .header-left .name {
                font-size: 32px !important;
            }
            .header-right {
                display: block !important;
                top: 30px !important;
                right: 20px !important;
            }
            .header-title {
                display: none;
            }
            .theme-btn {
                margin-right: 0;
                font-size: 24px;
            }
            .filter-panel {
                position: relative !important;
                bottom: auto !important;
                right: auto !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                padding: 10px 20px 30px 20px !important;
                justify-content: flex-start !important;
            }
            .viewport {
                position: relative !important;
                top: 0 !important;
                height: auto !important;
                padding: 0 20px 60px 20px !important;
                display: block !important;
                perspective: none !important;
            }
            .scene, .timeline {
                transform: none !important;
                position: static !important;
            }
            .ground-line, .label, .anchor-elements, .controls-panel {
                display: none !important;
            }
            #cards-container {
                transform: none !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                gap: 40px !important;
                padding-bottom: 40px !important;
                padding-top: 20px !important;
            }
            .card-container {
                position: relative !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                height: 360px !important;
                margin: 0 auto !important;
                max-width: 400px !important;
                
                /* Mac Dock Scale Logic Injection via JS */
                --mobile-scale: 1;
                --mobile-z: 1;
                transform: scale(var(--mobile-scale)) !important;
                z-index: var(--mobile-z) !important;
                transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1) !important;
                will-change: transform;
            }
            .card-frame {
                /* Mac Dock Shadow Logic Injection via JS */
                --m-shadow-y: 10px;
                --m-shadow-b: 15px;
                box-shadow: 0 var(--m-shadow-y) var(--m-shadow-b) -5px var(--shadow-color), 0 5px 10px -5px var(--shadow-color) !important;
                transform: none !important;
                transition: box-shadow 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.4s ease !important;
            }
            .card-content {
                filter: none !important;
                opacity: 1 !important;
            }
            .card-info {
                opacity: 1 !important;
            }
        }
    </style>
</head>
<body>

    <div class="header-left">
        <div class="name">Cristobal<br>D'Alessio</div>
        <div class="stats">FILTERED : <span id="project-count">0</span></div>
    </div>

    <div class="header-right">
        <button id="theme-toggle" class="theme-btn" title="Toggle Theme">🌙</button>
        <span class="header-title">project : archive</span>
    </div>

    <div class="filter-panel">
        <button class="filter-btn active" data-cat="all">all <sup id="count-all">0</sup></button>
        <button class="filter-btn" data-cat="art">art <sup id="count-art">0</sup></button>
        <button class="filter-btn" data-cat="productivity">productivity <sup id="count-productivity">0</sup></button>
        <button class="filter-btn" data-cat="game">game <sup id="count-game">0</sup></button>
    </div>

    <div class="viewport">
        <div class="scene" id="scene">
            <div class="timeline" id="timeline">
                <div class="ground-line" id="ground-line"></div>
                <div class="label" id="label-latest">start</div>
                <div class="label" id="label-oldest">finish</div>
                <div id="cards-container" style="transform-style: preserve-3d;"></div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="controls-card" id="controls-card">
            <div class="control-row">
                <div class="control-label-group"><span>Pitch (X)</span><span id="val-pitch">72°</span></div>
                <input type="range" id="input-pitch" min="30" max="85" value="72">
            </div>

            <div class="control-row">
                <div class="control-label-group"><span>Angle (Z)</span><span id="val-angle">42°</span></div>
                <input type="range" id="input-angle" min="0" max="90" value="42">
            </div>

            <div class="control-row">
                <div class="control-label-group"><span>Active Tilt</span><span id="val-tilt">-90°</span></div>
                <input type="range" id="input-tilt" min="-110" max="-30" value="-90">
            </div>

            <div class="control-row">
                <div class="control-label-group"><span>Active Rotate</span><span id="val-rotate">0°</span></div>
                <input type="range" id="input-rotate" min="-45" max="45" value="0">
            </div>

            <div class="control-row">
                <div class="control-label-group"><span>Card Size</span><span id="val-size">260px</span></div>
                <input type="range" id="input-size" min="150" max="400" value="260">
            </div>
        </div>
        <button class="adjust-btn" id="toggle-controls">⚙️ ADJUST VIEW</button>
    </div>

    <script>
        // --- THEME LOGIC ---
        const themeBtn = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.textContent = '☀️';
        }

        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeBtn.textContent = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeBtn.textContent = '☀️';
            }
        });

        //REMOVE FOR NOW
        // { id: 23, title: "Mac Finder", description: "Navigating a digital life via MacOS heritage", category: "productivity", url: "https://dalecri.github.io/apple-finder-aboutme/" },
        //{ id: 16, title: "Legacy Link", description: "A gamified profile in 8-bit nostalgia", category: "game", url: "https://dalecri.github.io/Gameboy-about-me/" },

        // --- DATA ---
     const PROJECTS = [
            { id: 1, title: "Maple Signal", description: "Geometric floral QR generator", category: "productivity", url: "https://dalecri.github.io/QR-Code-generator/" },
            { id: 2, title: "Typing Terrarium", description: "Grow digital flora through speed and precision", category: "productiviy", url: "https://dalecri.github.io/typing-speed-terrarium/" },
            { id: 3, title: "Voxel Garden", description: "Track tasks in a Zen space", category: "productivity", url: "https://dalecri.github.io/voxel-todo-garden/" },
            { id: 4, title: "Cipher Geode", description: "Extract crystalline security from raw data", category: "productivity", url: "https://dalecri.github.io/password-geode/" },
            { id: 5, title: "Atmospheric Loom", description: "Weaving seven-day forecasts into silk", category: "productivity", url: "https://dalecri.github.io/typographic-weather-loom/" },
            { id: 6, title: "Aesthetic Atelier", description: "A curated gallery of 3D visual renders", category: "productivity", url: "https://dalecri.github.io/3d-aesthetic-renders/" },
            { id: 7, title: "Writing Castle", description: "Watch your castle grow with your writing", category: "productivity", url: "https://dalecri.github.io/cathedral-markdown/" },
            { id: 8, title: "Nimbus Code", description: "Export beautiful code snippets", category: "productivity", url: "https://dalecri.github.io/nimbus-code-beautifier/" },
            { id: 9, title: "Cartography Canvas", description: "Randomly generated ASCII landscape architect", category: "art", url: "https://dalecri.github.io/ASCII-Map-generator/" },
            { id: 10, title: "IsoPaper Cubewall", description: "Prismatic cube-grid wallpaper studio", category: "art", url: "https://dalecri.github.io/isometric-cube-wallpaper-generator/" },
            { id: 11, title: "Pastel Menagerie", description: "Craft soft-hued digital spirits", category: "art", url: "https://dalecri.github.io/pixel-monster-creator/" },
            { id: 12, title: "Polygrade", description: "Minimalist canvas for low-fidelity art", category: "art", url: "https://dalecri.github.io/polygon-wallpaper-generator/" },
            { id: 13, title: "Lofi Sanctuary", description: "Ambient voxel room for deep work", category: "art", url: "https://dalecri.github.io/Voxel-lofi-room/" },
            { id: 14, title: "Cryptogotchi", description: "Nurture your digital security companion", category: "productivity", url: "https://dalecri.github.io/tamagotchi-password-gen/" },
            { id: 15, title: "Cozy 2048", description: "Soft-palette numerical merging", category: "game", url: "https://dalecri.github.io/cozy-2048/" },
            { id: 16, title: "Script Clock", description: "Real-time script-based timekeeping", category: "productivity", url: "https://dalecri.github.io/Script-Clock/" },
            { id: 17, title: "Retro Rubic", description: "A tactile 3D geometric puzzle classic", category: "game", url: "https://dalecri.github.io/rubics-cube/" },
            { id: 18, title: "Pixel Artist", description: "Simple Pixel Art", category: "art", url: "https://dalecri.github.io/pixel-art-generator/" },
            { id: 19, title: "IsoCity Tasker", description: "Construct your day in three dimensions", category: "productivity", url: "https://dalecri.github.io/isocity-todo-app/" },
            { id: 20, title: "Bloom Pomodoro", description: "High-focus intervals with a soft touch", category: "productivity", url: "https://dalecri.github.io/pomodoro-app/" },
            { id: 21, title: "Cupid Message", description: "Celestial calculations in a cosmic interface", category: "art", url: "https://dalecri.github.io/cute-love-message/" },
            { id: 22, title: "Nebula Math", description: "Fancy Cosmic Calculator", category: "productivity", url: "https://dalecri.github.io/cosmic-calculator/" },
            { id: 23, title: "Static Solace", description: "Sculpting focus through white noise", category: "productivity", url: "https://dalecri.github.io/noise-machine/" },
            { id: 24, title: "Chroma Flux", description: "Dynamic color-grid perception challenge", category: "game", url: "https://dalecri.github.io/chroma-flux/" },
            { id: 25, title: "Timezone Visualizer", description: "Canadian Time Zone Visual", category: "productivity", url: "https://dalecri.github.io/timezone-visualizer/" },
        ];

        // --- STATE & SETTINGS ---
        let focusIdx = 0;
        let currentFilter = "all";
        let config = { 
            pitch: 72,      
            angle: 42,      
            tilt: -90,      
            rotate: 0,      
            size: 260       
        };

        const PACK_STEP = 20;
        const SPREAD_GAP = 600;
        const POP_Z = 180;

        const cardsLayer = document.getElementById('cards-container');
        const timeline = document.getElementById('timeline');
        const scene = document.getElementById('scene');
        const groundLine = document.getElementById('ground-line');
        const labelLatest = document.getElementById('label-latest');
        const labelOldest = document.getElementById('label-oldest');
        const projectCountDisp = document.getElementById('project-count');

        function getFilteredItems() {
            return currentFilter === "all" ? PROJECTS : PROJECTS.filter(p => p.category === currentFilter);
        }

        // --- RENDER ---
        function createCards() {
            cardsLayer.innerHTML = '';
            const items = getFilteredItems();
            
            items.forEach((p, i) => {
                const container = document.createElement('div');
                container.className = 'card-container';
                container.id = `card-${i}`;
                
                const previewUrl = `https://api.microlink.io?url=${encodeURIComponent(p.url)}&screenshot=true&embed=screenshot.url`;

                container.innerHTML = `
                    <div class="card-frame">
                        <div class="card-content">
                            <img class="card-preview-img" 
                                 src="${previewUrl}" 
                                 alt="${p.title}" 
                                 loading="lazy"
                                 onload="this.style.opacity=1"
                                 style="opacity:0">
                        </div>
                        <div class="card-info">
                            <div class="card-title">${p.title}</div>
                            <div class="card-desc">${p.description}</div>
                        </div>
                    </div>
                    <div class="anchor-elements">
                        <div class="plus-icon" style="top: -${config.size + 40}px">+</div>
                        <div class="anchor-line" style="bottom: -${POP_Z}px; height: ${POP_Z}px;"></div>
                        <div class="focused-label" style="bottom: -${POP_Z}px;">
                            focused project<br/>
                            <span style="font-weight:700; font-size:11px; color:var(--text-main)">${String(i + 1).padStart(2, '0')} — ${items.length}</span>
                        </div>
                    </div>
                `;

                container.onclick = () => {
                    if (window.innerWidth <= 768) {
                        window.open(p.url, '_blank');
                    } else {
                        if (focusIdx === i) {
                            window.open(p.url, '_blank');
                        } else {
                            focusIdx = i;
                            updateScene();
                        }
                    }
                };
                cardsLayer.appendChild(container);
            });
            
            projectCountDisp.textContent = items.length;
            updateCounts();

            if (window.innerWidth <= 768) {
                setTimeout(handleMobileScroll, 50);
            }
        }

        function updateCounts() {
            document.getElementById('count-all').textContent = PROJECTS.length;
            document.getElementById('count-art').textContent = PROJECTS.filter(p => p.category === "art").length;
            document.getElementById('count-productivity').textContent = PROJECTS.filter(p => p.category === "productivity").length;
            document.getElementById('count-game').textContent = PROJECTS.filter(p => p.category === "game").length;
        }

        function updateScene() {
            if (window.innerWidth <= 768) {
                handleMobileScroll();
                return;
            }

            const items = getFilteredItems();
            const totalLength = items.length * PACK_STEP;
            scene.style.transform = `rotateX(${config.pitch}deg) rotateZ(${config.angle}deg)`;

            const getCardY = (i) => {
                const base = (totalLength / 2) - (i * PACK_STEP);
                if (focusIdx < 0) return base;
                if (i < focusIdx) return base + SPREAD_GAP / 2;
                if (i === focusIdx) return base;
                return base - SPREAD_GAP / 2;
            };

            const focusY = getCardY(focusIdx);
            timeline.style.transform = `translateY(${-focusY}px)`;

            const lineH = totalLength + (focusIdx >= 0 ? SPREAD_GAP : 0);
            groundLine.style.height = `${lineH}px`;
            groundLine.style.top = `${-totalLength / 2 - (focusIdx >= 0 ? SPREAD_GAP / 2 : 0)}px`;

            const labelTransform = `translate3d(-50%, 0, 0) rotateZ(${config.rotate - config.angle}deg) rotateX(${config.tilt}deg)`;
            labelLatest.style.top = `${totalLength / 2 + (focusIdx >= 0 ? SPREAD_GAP / 2 : 0) + 40}px`;
            labelLatest.style.transform = labelTransform;
            labelOldest.style.top = `${-totalLength / 2 - (focusIdx >= 0 ? SPREAD_GAP / 2 : 0) - 20}px`;
            labelOldest.style.transform = labelTransform;

            items.forEach((_, i) => {
                const el = document.getElementById(`card-${i}`);
                if (!el) return;
                const isFocused = i === focusIdx;
                const isNotFocused = !isFocused;
                const y = getCardY(i);
                const z = isFocused ? POP_Z : 0;
                const zIndex = isFocused ? 1000 : items.length - i;
                const cardZRot = isFocused ? (config.rotate - config.angle) : 0;
                const currentTilt = isFocused ? config.tilt : -90;

                const cardHeight = config.size * 1.15;
                el.style.width = `${config.size}px`;
                el.style.height = `${cardHeight}px`; 
                el.style.top = `-${cardHeight}px`;
                el.style.zIndex = zIndex;
                el.style.transform = `translate3d(${-config.size/2}px, ${y}px, ${z}px) rotateZ(${cardZRot}deg) rotateX(${currentTilt}deg)`;
                
                el.classList.toggle('active', isFocused);
                const content = el.querySelector('.card-content');
                const info = el.querySelector('.card-info');
                const plus = el.querySelector('.plus-icon');
                
                content.style.filter = isNotFocused ? 'blur(2px) grayscale(0.5)' : 'none';
                content.style.opacity = isNotFocused ? '0.5' : '1';
                info.style.opacity = isNotFocused ? '0.3' : '1';
                if(plus) plus.style.top = `-${cardHeight + 40}px`;
            });
        }

        // --- FLUID MOBILE "MAC DOCK" SCROLL LOGIC ---
        function handleMobileScroll() {
            if (window.innerWidth > 768) return;
            const centerY = window.innerHeight / 2;
            
            document.querySelectorAll('.card-container').forEach(card => {
                const rect = card.getBoundingClientRect();
                if (rect.height === 0) return; // Skip unmounted
                
                const cardCenter = rect.top + rect.height / 2;
                const dist = Math.abs(centerY - cardCenter);
                
                const maxDist = window.innerHeight * 0.5; 
                let scale = 1;
                let zIndex = 1;
                let shadowY = 10;
                let shadowBlur = 15;
                
                if (dist < maxDist) {
                    const intensity = 1 - (dist / maxDist);
                    const eased = Math.pow(intensity, 1.8); 
                    
                    scale = 1 + (0.12 * eased);
                    zIndex = Math.round(10 + (eased * 100));
                    
                    shadowY = 10 + (12 * eased);
                    shadowBlur = 15 + (15 * eased);
                }
                
                card.style.setProperty('--mobile-scale', scale.toFixed(3));
                card.style.setProperty('--mobile-z', zIndex);
                
                const frame = card.querySelector('.card-frame');
                if (frame) {
                    frame.style.setProperty('--m-shadow-y', `${shadowY.toFixed(1)}px`);
                    frame.style.setProperty('--m-shadow-b', `${shadowBlur.toFixed(1)}px`);
                }
            });
        }

        window.addEventListener('scroll', () => {
            if (window.innerWidth <= 768) {
                requestAnimationFrame(handleMobileScroll);
            }
        }, { passive: true });

        // --- INTERACTION LOGIC ---
        const toggleBtn = document.getElementById('toggle-controls');
        const controlsCard = document.getElementById('controls-card');

        toggleBtn.onclick = () => controlsCard.classList.toggle('open');

        const inputs = ['pitch', 'angle', 'tilt', 'rotate', 'size'];
        inputs.forEach(id => {
            const input = document.getElementById(`input-${id}`);
            const display = document.getElementById(`val-${id}`);
            input.oninput = (e) => {
                const val = Number(e.target.value);
                config[id] = val;
                display.textContent = val + (id === 'size' ? 'px' : '°');
                updateScene();
            };
        });

        // Filtering logic
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.closest('button').classList.add('active');
                currentFilter = e.target.closest('button').dataset.cat;
                focusIdx = 0;
                createCards();
                updateScene();
            };
        });

        // Navigation
        window.addEventListener('keydown', (e) => {
            if (window.innerWidth <= 768) return; 
            const items = getFilteredItems();
            if (e.key === 'ArrowRight') {
                focusIdx = Math.min(items.length - 1, focusIdx + 1);
                updateScene();
            } else if (e.key === 'ArrowLeft') {
                focusIdx = Math.max(0, focusIdx - 1);
                updateScene();
            }
        });

        let lastScroll = 0;
        window.addEventListener('wheel', (e) => {
            if (window.innerWidth <= 768) return; 
            
            const now = Date.now();
            if (now - lastScroll < 60) return;
            const items = getFilteredItems();
            if (Math.abs(e.deltaY) > 10 || Math.abs(e.deltaX) > 10) {
                if (e.deltaY > 0 || e.deltaX > 0) {
                    focusIdx = Math.min(items.length - 1, focusIdx + 1);
                } else {
                    focusIdx = Math.max(0, focusIdx - 1);
                }
                lastScroll = now;
                updateScene();
            }
        }, { passive: false });

        window.addEventListener('resize', () => {
            updateScene();
        });

        // --- INIT ---
        createCards();
        updateScene();

    </script>
</body>
</html>
