<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cristobal D'Alessio | Project Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500&family=Silkscreen:wght@400;700&family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- Light Theme --- */
            --bg-color: #dcd6ce; 
            --card-paper: #8a8d91; /* Cartridge grey */
            --card-indent: #75787c;
            --card-content-bg: #111;
            --text-main: #36322e;
            --text-muted: #736d65;
            --text-accent: #9c958b;
            --border-color: rgba(54, 50, 46, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --slider-bg: #c9c2b8;
            --highlight: rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            /* --- Dark Theme (Default) --- */
            --bg-color: #292623; 
            --card-paper: #4a4d51; 
            --card-indent: #3a3d41;
            --card-content-bg: #000;
            --text-main: #e8e2d9;
            --text-muted: #a39b91;
            --text-accent: #756f67;
            --border-color: rgba(232, 226, 217, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.6);
            --slider-bg: #4a453f;
            --highlight: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .header-left {
            position: absolute;
            top: 50px;
            left: 60px;
            z-index: 100;
        }

        .header-left .name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 42px;
            line-height: 0.9;
            color: var(--text-main);
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .header-left .stats {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 18px;
            color: var(--text-muted);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .filter-panel {
            position: absolute;
            top: 50px;
            right: 60px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .filter-btn {
            background: none;
            border: none;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.2s ease;
            text-transform: lowercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn.active {
            opacity: 1;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .filter-btn sup {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
        }

        .viewport {
            position: absolute;
            inset: 0;
            top: 35%; 
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2200px;
        }

        .scene {
            transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .timeline {
            transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .ground-line {
            position: absolute;
            width: 1px;
            background: var(--border-color);
            left: 0;
            transform: translateX(-50%);
        }

        .label {
            position: absolute;
            left: 0;
            transform-style: preserve-3d;
            transform-origin: bottom center;
            color: var(--text-accent);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 2px;
            font-family: 'Silkscreen', cursive;
            text-transform: uppercase;
            white-space: nowrap;
            transition: top 0.65s, transform 0.65s;
        }

        .card-container {
            position: absolute;
            left: 0;
            transform-style: preserve-3d;
            transform-origin: bottom center;
            transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1), z-index 0.65s;
            cursor: pointer;
        }

        .card-frame {
            width: 92%;
            height: 100%;
            margin: 0 auto;
            position: relative;
            background: var(--card-paper);
            border-radius: 12px;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            box-shadow: 
                0 8px 12px -2px var(--shadow-color), 
                inset 0 -2px 6px rgba(0,0,0,0.4);
            transform-origin: bottom center;
            transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease, background-color 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: visible;
            container-type: inline-size;
        }

        /* Cartridge Top Lip */
        .gba-lip {
            width: 108.7%;
            align-self: center;
            height: 22%;
            background: var(--card-paper);
            border-bottom: 2px solid rgba(0,0,0,0.15);
            border-radius: 8px;
            box-shadow: 
                inset 0 2px 4px var(--highlight),
                0 4px 6px -2px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            transition: box-shadow 0.4s ease;
        }

        .gba-logo-area {
            width: 70%;
            height: 60%;
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.2), 0 1px 1px var(--highlight);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-indent);
            overflow: hidden;
        }

        .gba-logo-text {
            font-family: 'Space Mono', monospace;
            font-size: min(12px, 3.8cqw);
            font-weight: 700;
            color: var(--text-main);
            opacity: 0.4;
            text-shadow: 0 1px 1px var(--highlight);
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.4s ease;
        }

        /* Recessed Indent for Sticker */
        .gba-label-recess {
            width: 88%;
            flex: 1;
            margin-bottom: 20%;
            background: var(--card-indent);
            border-radius: 12px;
            padding: 1.5%;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.3), 0 1px 1px var(--highlight);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-content {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background: white;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
            transition: filter 0.6s ease, opacity 0.6s ease;
        }

        .card-preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .esrb-logo {
            position: absolute;
            bottom: 4%;
            left: 4%;
            width: 11%;
            background: white;
            border: min(2px, 0.4cqw) solid black;
            display: flex;
            flex-direction: column;
            border-radius: 2px;
            overflow: hidden;
            z-index: 10;
        }

        .esrb-top {
            background: black;
            color: white;
            font-family: 'Arial', sans-serif;
            font-size: min(4px, 1cqw);
            font-weight: 900;
            text-align: center;
            padding: 1px 0;
            letter-spacing: 0.5px;
        }

        .esrb-e {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-family: 'Arial', sans-serif;
            font-size: min(18px, 5cqw);
            font-weight: 900;
            line-height: 1;
            padding: 2px 0;
        }

        .esrb-bottom {
            font-family: 'Arial', sans-serif;
            font-size: min(3.5px, 0.8cqw);
            font-weight: 700;
            color: black;
            text-align: center;
            line-height: 1;
            padding-bottom: 2px;
        }

        /* Bottom Grip Grooves */
        .gba-bottom-grip {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 10%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .gba-bottom-grip span {
            width: 100%;
            height: 2px;
            background: rgba(0,0,0,0.15);
            box-shadow: 0 1px 1px var(--highlight);
            border-radius: 2px;
        }

        .gba-triangle {
            position: absolute;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: min(8px, 2cqw) solid transparent;
            border-right: min(8px, 2cqw) solid transparent;
            border-top: min(8px, 2cqw) solid rgba(0,0,0,0.2);
            filter: drop-shadow(0 1px 0px var(--highlight));
        }

        .card-container.active .card-frame {
            box-shadow: 
                0 25px 35px -10px var(--shadow-color), 
                0 10px 10px -5px var(--shadow-color),
                inset 0 -2px 6px rgba(0,0,0,0.4);
            transform: scale(1.15);
        }

        .card-container.active .gba-lip {
            box-shadow: 
                0 15px 25px -5px rgba(0,0,0,0.3),
                inset 0 2px 4px var(--highlight);
        }

        .card-container.active .gba-logo-text {
            opacity: 1;
            text-shadow: 0 1px 1px var(--bg-color), 0 0 12px var(--highlight);
            transform: scale(1.05);
        }

        /* --- Click & Enter Animation: Insert Cartridge & Screen Glare --- */
        .card-container.insert-cartridge .card-frame {
            animation: cartridge-bounce 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes cartridge-bounce {
            0% { transform: scale(1.15) translateY(0); box-shadow: 0 25px 35px -10px var(--shadow-color), 0 10px 10px -5px var(--shadow-color), inset 0 -2px 6px rgba(0,0,0,0.4); }
            50% { transform: scale(0.95) translateY(80px); box-shadow: 0 5px 10px -5px var(--shadow-color), inset 0 -2px 6px rgba(0,0,0,0.6); }
            100% { transform: scale(1.15) translateY(0); box-shadow: 0 25px 35px -10px var(--shadow-color), 0 10px 10px -5px var(--shadow-color), inset 0 -2px 6px rgba(0,0,0,0.4); }
        }

        .screen-glare {
            position: absolute;
            top: 0;
            left: -150%;
            width: 150%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            transform: skewX(-25deg);
            z-index: 20;
            pointer-events: none;
        }

        .card-container.insert-cartridge .screen-glare {
            animation: glare-flash 0.3s ease-out forwards;
        }

        @keyframes glare-flash {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        .controls-panel {
            position: absolute;
            bottom: 40px;
            right: 60px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }

        .controls-card {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px var(--shadow-color);
            border: 1px solid var(--border-color);
            display: none;
            flex-direction: column;
            gap: 14px;
            width: 240px;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .controls-card.open { display: flex; }

        .control-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label-group {
            display: flex;
            justify-content: space-between;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 0.8px;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: var(--slider-bg);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            transition: background-color 0.4s ease;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--text-main);
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.4s ease;
        }

        /* Modernize Theme Toggle */
        .modern-theme-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            margin-top: 5px;
        }

        .modern-theme-btn:hover {
            background: var(--text-main);
            color: var(--bg-color);
        }

        .adjust-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--shadow-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .adjust-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .adjust-btn:hover {
            transform: translateY(-3px) rotate(10deg);
            box-shadow: 0 6px 15px var(--shadow-color);
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto !important;
                height: auto !important;
                min-height: 100vh;
            }
            .header-left {
                position: relative !important;
                top: 0 !important;
                left: 0 !important;
                padding: 30px 20px 10px 20px !important;
            }
            .header-left .name {
                font-size: 32px !important;
            }
            .filter-panel {
                position: relative !important;
                top: 0 !important;
                right: auto !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                padding: 10px 20px 30px 20px !important;
                justify-content: flex-start !important;
            }
            .viewport {
                position: relative !important;
                top: 0 !important;
                height: auto !important;
                padding: 0 20px 60px 20px !important;
                display: block !important;
                perspective: none !important;
            }
            .scene, .timeline {
                transform: none !important;
                position: static !important;
            }
            .ground-line, .label, .controls-panel {
                display: none !important;
            }
            #cards-container {
                transform: none !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                gap: 40px !important;
                padding-bottom: 40px !important;
                padding-top: 20px !important;
            }
            .card-container {
                position: relative !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                height: 240px !important; /* GBA aspect ratio for mobile */
                margin: 0 auto !important;
                max-width: 380px !important;
                
                --mobile-scale: 1;
                --mobile-z: 1;
                transform: scale(var(--mobile-scale)) !important;
                z-index: var(--mobile-z) !important;
                transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1) !important;
                will-change: transform;
            }
            .card-frame {
                --m-shadow-y: 10px;
                --m-shadow-b: 15px;
                box-shadow: 0 var(--m-shadow-y) var(--m-shadow-b) -5px var(--shadow-color), 0 5px 10px -5px var(--shadow-color), inset 0 -2px 6px rgba(0,0,0,0.4) !important;
                transform: none !important;
                transition: box-shadow 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.4s ease !important;
            }
            .gba-lip {
                box-shadow: 0 calc(var(--m-shadow-y) * 0.5) calc(var(--m-shadow-b) * 0.5) -2px rgba(0,0,0,0.2), inset 0 2px 4px var(--highlight) !important;
            }
            .card-content {
                filter: none !important;
                opacity: 1 !important;
            }
            .card-container.insert-cartridge .card-frame {
                animation: mobile-cartridge-bounce 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
            }
            @keyframes mobile-cartridge-bounce {
                0% { transform: translateY(0); }
                50% { transform: translateY(40px) scale(0.95); }
                100% { transform: translateY(0); }
            }
        }
    </style>
</head>
<body>

    <div class="header-left">
        <div class="name">Cristobal<br>D'Alessio</div>
        <div class="stats">FILTERED : <span id="project-count">0</span></div>
    </div>

    <div class="filter-panel">
        <button class="filter-btn active" data-cat="all">all <sup id="count-all">0</sup></button>
        <button class="filter-btn" data-cat="art">art <sup id="count-art">0</sup></button>
        <button class="filter-btn" data-cat="interactive">interactive <sup id="count-interactive">0</sup></button>
        <button class="filter-btn" data-cat="productivity">productivity <sup id="count-productivity">0</sup></button>
        <button class="filter-btn" data-cat="game">game <sup id="count-game">0</sup></button>
    </div>

    <div class="viewport">
        <div class="scene" id="scene">
            <div class="timeline" id="timeline">
                <div class="ground-line" id="ground-line"></div>
                <div class="label" id="label-latest">start</div>
                <div class="label" id="label-oldest">finish</div>
                <div id="cards-container" style="transform-style: preserve-3d;"></div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="controls-card" id="controls-card">
            <button id="theme-toggle" class="modern-theme-btn">
                <span>Toggle Theme</span>
            </button>
            <div class="control-row" style="margin-top: 10px;">
                <div class="control-label-group"><span>Pitch (X)</span><span id="val-pitch">72°</span></div>
                <input type="range" id="input-pitch" min="30" max="85" value="72">
            </div>
            <div class="control-row">
                <div class="control-label-group"><span>Angle (Z)</span><span id="val-angle">42°</span></div>
                <input type="range" id="input-angle" min="0" max="90" value="42">
            </div>
            <div class="control-row">
                <div class="control-label-group"><span>Active Tilt</span><span id="val-tilt">-90°</span></div>
                <input type="range" id="input-tilt" min="-110" max="-30" value="-90">
            </div>
            <div class="control-row">
                <div class="control-label-group"><span>Active Rotate</span><span id="val-rotate">0°</span></div>
                <input type="range" id="input-rotate" min="-45" max="45" value="0">
            </div>
            <div class="control-row">
                <div class="control-label-group"><span>Cartridge Size</span><span id="val-size">280px</span></div>
                <input type="range" id="input-size" min="180" max="400" value="280">
            </div>
            <div class="control-row">
                <div class="control-label-group"><span>Offset (Y)</span><span id="val-offsetY">250px</span></div>
                <input type="range" id="input-offsetY" min="-300" max="300" value="250">
            </div>
        </div>
        <button class="adjust-btn" id="toggle-controls" title="Adjust View">
            <svg viewBox="0 0 24 24">
                <rect x="2" y="6" width="20" height="12" rx="4" ry="4"></rect>
                <path d="M6 12h4"></path>
                <path d="M8 10v4"></path>
                <line x1="15" y1="13" x2="15.01" y2="13"></line>
                <line x1="18" y1="11" x2="18.01" y2="11"></line>
            </svg>
        </button>
    </div>

    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark'; // Force default dark
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.removeAttribute('data-theme');
        }

        const PROJECTS = [
            { id: 1, title: "Lamplight", description: "Your cozy RSVP Library", category: "productivity", url: "https://dalecri.github.io/Lamplight/" },
            { id: 2, title: "Todo Garden", description: "Garden Voxel-inspired Todo App", category: "interactive", url: "https://dalecri.github.io/japanese-voxel-todo/" },
            { id: 3, title: "Typing Terrarium", description: "Grow digital flora through speed and precision", category: "interactive", url: "https://dalecri.github.io/typing-speed-terrarium/" },
            { id: 4, title: "Todo Desert", description: "Desert Voxel-inspired Todo App", category: "interactive", url: "https://dalecri.github.io/mesa-garden-todo/" },
            { id: 5, title: "Maple Signal", description: "Geometric floral QR generator", category: "productivity", url: "https://dalecri.github.io/QR-Code-generator/" },
            { id: 6, title: "Aesthetic Atelier", description: "A curated gallery of 3D visual renders", category: "interactive", url: "https://dalecri.github.io/3d-aesthetic-renders/" },
            { id: 7, title: "Notesy Castle", description: "Watch your castle grow with your writing", category: "interactive", url: "https://dalecri.github.io/cathedral-markdown/" },
            { id: 8, title: "Nimbus Code", description: "Export beautiful code snippets", category: "productivity", url: "https://dalecri.github.io/nimbus-code-beautifier/" },
            { id: 9, title: "Cartography Canvas", description: "Randomly generated ASCII landscape architect", category: "art", url: "https://dalecri.github.io/ASCII-Map-generator/" },
            { id: 10, title: "IsoPaper Cubewall", description: "Prismatic cube-grid wallpaper studio", category: "art", url: "https://dalecri.github.io/isometric-cube-wallpaper-generator/" },
            { id: 11, title: "Pastel Menagerie", description: "Craft soft-hued digital spirits", category: "art", url: "https://dalecri.github.io/pixel-monster-creator/" },
            { id: 12, title: "Polygrade", description: "Minimalist canvas for low-fidelity art", category: "art", url: "https://dalecri.github.io/polygon-wallpaper-generator/" },
            { id: 13, title: "Lofi Sanctuary", description: "Ambient voxel room for deep work", category: "interactive", url: "https://dalecri.github.io/Voxel-lofi-room/" },
            { id: 14, title: "Cryptogotchi", description: "Nurture your digital security companion", category: "productivity", url: "https://dalecri.github.io/tamagotchi-password-gen/" },
            { id: 15, title: "Cozy 2048", description: "Soft-palette numerical merging", category: "game", url: "https://dalecri.github.io/cozy-2048/" },
            { id: 16, title: "Script Clock", description: "Real-time script-based timekeeping", category: "productivity", url: "https://dalecri.github.io/Script-Clock/" },
            { id: 17, title: "Retro Rubic", description: "A tactile 3D geometric puzzle classic", category: "game", url: "https://dalecri.github.io/rubics-cube/" },
            { id: 18, title: "Pixel Artist", description: "Simple Pixel Art", category: "art", url: "https://dalecri.github.io/pixel-art-generator/" },
            { id: 19, title: "Riverhouse Todo", description: "Labelle-inspired Voxel Todo App", category: "interactive", url: "https://dalecri.github.io/voxel-city-river/" },
            { id: 20, title: "Cipher Geode", description: "Extract crystalline security from raw data", category: "productivity", url: "https://dalecri.github.io/password-geode/" },
            { id: 21, title: "Weather Loom", description: "Atmospheric Weather Loom App", category: "interactive", url: "https://dalecri.github.io/typographic-weather-loom/" },
            { id: 22, title: "Apartment Todo", description: "Apartment inspired todo", category: "productivity", url: "https://dalecri.github.io/floating-apartment-todo/" },
            { id: 23, title: "Carte Blache", description: "Practice your french", category: "productivity", url: "https://dalecri.github.io/FudgeMyFrench/" },
            { id: 25, title: "Mobile Viewer", description: "Test websites for mobile", category: "productivity", url: "https://dalecri.github.io/mobile-render/" }
        ];

        let focusIdx = 0;
        let currentFilter = "all";
        let config = { 
            pitch: 72,      
            angle: 42,      
            tilt: -90,      
            rotate: 0,      
            size: 280,
            offsetY: 250
        };

        const PACK_STEP = 30;
        const SPREAD_GAP = 600;
        const POP_Z = 180;

        const cardsLayer = document.getElementById('cards-container');
        const timeline = document.getElementById('timeline');
        const scene = document.getElementById('scene');
        const groundLine = document.getElementById('ground-line');
        const labelLatest = document.getElementById('label-latest');
        const labelOldest = document.getElementById('label-oldest');
        const projectCountDisp = document.getElementById('project-count');

        function getFilteredItems() {
            return currentFilter === "all" ? PROJECTS : PROJECTS.filter(p => p.category === currentFilter);
        }

        // Handles the animation delay and same-tab routing
        function playAndNavigate(index, url) {
            const el = document.getElementById(`card-${index}`);
            if (!el) return;
            
            el.classList.add('insert-cartridge');
            
            // Wait for the bounce animation to finish, then navigate current tab
            setTimeout(() => {
                window.location.assign(url);
                
                // Clean up in case the user uses the browser 'Back' button
                setTimeout(() => {
                    el.classList.remove('insert-cartridge');
                }, 100);
            }, 300);
        }

        function createCards() {
            cardsLayer.innerHTML = '';
            const items = getFilteredItems();
            
            items.forEach((p, i) => {
                const container = document.createElement('a');
                container.className = 'card-container';
                container.id = `card-${i}`;
                container.href = p.url;
                
                const previewUrl = `https://api.microlink.io?url=${encodeURIComponent(p.url)}&screenshot=true&embed=screenshot.url`;

                container.innerHTML = `
                    <div class="card-frame" style="container-type: inline-size;">
                        <div class="gba-lip">
                            <div class="gba-logo-area">
                                <span class="gba-logo-text">${p.title}</span>
                            </div>
                        </div>
                        <div class="gba-label-recess">
                            <div class="card-content">
                                <img class="card-preview-img" 
                                     src="${previewUrl}" 
                                     alt="${p.title}" 
                                     loading="lazy"
                                     onload="this.style.opacity=1"
                                     style="opacity:0">
                                <div class="screen-glare"></div>
                                <div class="esrb-logo">
                                    <div class="esrb-top">EVERYONE</div>
                                    <div class="esrb-e">E</div>
                                    <div class="esrb-bottom">CONTENT RATED BY<br>ESRB</div>
                                </div>
                            </div>
                        </div>
                        <div class="gba-bottom-grip">
                            <span></span><span></span><span></span>
                        </div>
                        <div class="gba-triangle"></div>
                    </div>
                `;

                container.onclick = (e) => {
                    // Only intercept normal left clicks (allow ctrl/cmd clicks to open in new tabs naturally)
                    if (e.button === 0 && !e.ctrlKey && !e.metaKey && !e.shiftKey) {
                        e.preventDefault(); // Stop instant navigation
                        if (window.innerWidth <= 768) {
                            playAndNavigate(i, p.url);
                        } else {
                            if (focusIdx === i) {
                                playAndNavigate(i, p.url);
                            } else {
                                focusIdx = i;
                                updateScene();
                            }
                        }
                    }
                };
                cardsLayer.appendChild(container);
            });
            
            projectCountDisp.textContent = items.length;
            updateCounts();

            if (window.innerWidth <= 768) {
                setTimeout(handleMobileScroll, 50);
            }
        }

        function updateCounts() {
            document.getElementById('count-all').textContent = PROJECTS.length;
            document.getElementById('count-art').textContent = PROJECTS.filter(p => p.category === "art").length;
            document.getElementById('count-interactive').textContent = PROJECTS.filter(p => p.category === "interactive").length;
            document.getElementById('count-productivity').textContent = PROJECTS.filter(p => p.category === "productivity").length;
            document.getElementById('count-game').textContent = PROJECTS.filter(p => p.category === "game").length;
        }

        function updateScene() {
            if (window.innerWidth <= 768) {
                handleMobileScroll();
                return;
            }

            const items = getFilteredItems();
            const totalLength = items.length * PACK_STEP;
            scene.style.transform = `translateY(${config.offsetY}px) rotateX(${config.pitch}deg) rotateZ(${config.angle}deg)`;

            const getCardY = (i) => {
                const base = (totalLength / 2) - (i * PACK_STEP);
                if (focusIdx < 0) return base;
                if (i < focusIdx) return base + SPREAD_GAP / 2;
                if (i === focusIdx) return base;
                return base - SPREAD_GAP / 2;
            };

            const focusY = getCardY(focusIdx);
            timeline.style.transform = `translateY(${-focusY}px)`;

            const lineH = totalLength + (focusIdx >= 0 ? SPREAD_GAP : 0);
            groundLine.style.height = `${lineH}px`;
            groundLine.style.top = `${-totalLength / 2 - (focusIdx >= 0 ? SPREAD_GAP / 2 : 0)}px`;

            const labelTransform = `translate3d(-50%, 0, 0) rotateZ(${config.rotate - config.angle}deg) rotateX(${config.tilt}deg)`;
            labelLatest.style.top = `${totalLength / 2 + (focusIdx >= 0 ? SPREAD_GAP / 2 : 0) + 40}px`;
            labelLatest.style.transform = labelTransform;
            labelOldest.style.top = `${-totalLength / 2 - (focusIdx >= 0 ? SPREAD_GAP / 2 : 0) - 20}px`;
            labelOldest.style.transform = labelTransform;

            items.forEach((_, i) => {
                const el = document.getElementById(`card-${i}`);
                if (!el) return;
                const isFocused = i === focusIdx;
                const isNotFocused = !isFocused;
                const y = getCardY(i);
                const z = isFocused ? POP_Z : 0;
                const zIndex = isFocused ? 1000 : items.length - i;
                const cardZRot = isFocused ? (config.rotate - config.angle) : 0;
                const currentTilt = isFocused ? config.tilt : -90;

                const cardHeight = config.size * 0.9; /* Slightly squatter for GBA ratio */
                el.style.width = `${config.size}px`;
                el.style.height = `${cardHeight}px`; 
                el.style.top = `-${cardHeight}px`;
                el.style.zIndex = zIndex;
                el.style.transform = `translate3d(${-config.size/2}px, ${y}px, ${z}px) rotateZ(${cardZRot}deg) rotateX(${currentTilt}deg)`;
                
                el.classList.toggle('active', isFocused);
                const content = el.querySelector('.card-content');
                
                content.style.filter = isNotFocused ? 'blur(2px) grayscale(0.5)' : 'none';
                content.style.opacity = isNotFocused ? '0.5' : '1';
            });
        }

        function handleMobileScroll() {
            if (window.innerWidth > 768) return;
            const centerY = window.innerHeight / 2;
            
            document.querySelectorAll('.card-container').forEach(card => {
                const rect = card.getBoundingClientRect();
                if (rect.height === 0) return; 
                
                const cardCenter = rect.top + rect.height / 2;
                const dist = Math.abs(centerY - cardCenter);
                
                const maxDist = window.innerHeight * 0.5; 
                let scale = 1;
                let zIndex = 1;
                let shadowY = 10;
                let shadowBlur = 15;
                
                if (dist < maxDist) {
                    const intensity = 1 - (dist / maxDist);
                    const eased = Math.pow(intensity, 1.8); 
                    
                    scale = 1 + (0.12 * eased);
                    zIndex = Math.round(10 + (eased * 100));
                    
                    shadowY = 10 + (12 * eased);
                    shadowBlur = 15 + (15 * eased);
                }
                
                card.style.setProperty('--mobile-scale', scale.toFixed(3));
                card.style.setProperty('--mobile-z', zIndex);
                
                const frame = card.querySelector('.card-frame');
                if (frame) {
                    frame.style.setProperty('--m-shadow-y', `${shadowY.toFixed(1)}px`);
                    frame.style.setProperty('--m-shadow-b', `${shadowBlur.toFixed(1)}px`);
                }
            });
        }

        window.addEventListener('scroll', () => {
            if (window.innerWidth <= 768) {
                requestAnimationFrame(handleMobileScroll);
            }
        }, { passive: true });

        const toggleBtn = document.getElementById('toggle-controls');
        const controlsCard = document.getElementById('controls-card');

        toggleBtn.onclick = () => controlsCard.classList.toggle('open');

        const inputs = ['pitch', 'angle', 'tilt', 'rotate', 'size', 'offsetY'];
        inputs.forEach(id => {
            const input = document.getElementById(`input-${id}`);
            const display = document.getElementById(`val-${id}`);
            if(input) {
                input.oninput = (e) => {
                    const val = Number(e.target.value);
                    config[id] = val;
                    display.textContent = val + (id === 'size' || id === 'offsetY' ? 'px' : '°');
                    updateScene();
                };
            }
        });

        const themeToggleBtn = document.getElementById('theme-toggle');
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                }
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.closest('button').classList.add('active');
                currentFilter = e.target.closest('button').dataset.cat;
                focusIdx = 0;
                createCards();
                updateScene();
            };
        });

        window.addEventListener('keydown', (e) => {
            if (window.innerWidth <= 768) return; 
            const items = getFilteredItems();
            
            if (e.key === 'Enter') {
                if(items[focusIdx]) {
                    playAndNavigate(focusIdx, items[focusIdx].url);
                }
            } else if (e.key === 'ArrowRight') {
                focusIdx = Math.min(items.length - 1, focusIdx + 1);
                updateScene();
            } else if (e.key === 'ArrowLeft') {
                focusIdx = Math.max(0, focusIdx - 1);
                updateScene();
            }
        });

        let lastScroll = 0;
        window.addEventListener('wheel', (e) => {
            if (window.innerWidth <= 768) return; 
            
            const now = Date.now();
            if (now - lastScroll < 60) return;
            const items = getFilteredItems();
            if (Math.abs(e.deltaY) > 10 || Math.abs(e.deltaX) > 10) {
                if (e.deltaY > 0 || e.deltaX > 0) {
                    focusIdx = Math.min(items.length - 1, focusIdx + 1);
                } else {
                    focusIdx = Math.max(0, focusIdx - 1);
                }
                lastScroll = now;
                updateScene();
            }
        }, { passive: false });

        window.addEventListener('resize', () => {
            updateScene();
        });

        createCards();
        updateScene();

    </script>
</body>
</html>
