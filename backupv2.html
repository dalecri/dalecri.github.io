<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cristobal's Web Projects - Archive</title>

  <!-- CSS Framework & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --offset-x: 0px;
      --offset-y: 375px;
      --zoom: 1;
      --radius: 500px;
      --card-w: 320px;
      --card-h: 448px;
      --card-radius: 12px;
      --scene-rx: 81deg;
      --scene-rz: -55deg;
      --card-rx: -93deg;
      --card-ry: -55deg;
      --card-rz: -3deg;
      --depth: 12px;
      --bg-solid: #F7F4EF;
      --text-primary: #2B2520;
      --text-secondary: #7A6F68;
      --panel-bg: rgba(255, 253, 249, 0.8);
      --panel-border: rgba(218, 211, 201, 0.4);
      --accent-primary: #D95D39;
      --shadow-color: rgba(43, 37, 32, 0.08);
    }

    body {
      font-family: 'Space Grotesk', 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-solid);
      margin: 0;
      overflow: hidden;
      user-select: none;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      color: var(--text-primary);
      transition: background 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), color 0.5s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y;
    }

    /* Tablet responsive tightening */
    @media (max-width: 900px) {
      .header-title {
        font-size: 22px !important;
      }

      .header-wrap {
        padding: 18px !important;
      }

      #filter-sidebar {
        right: 18px !important;
        gap: 6px !important;
      }

      #info-panel {
        left: 18px !important;
        right: 18px !important;
        bottom: 18px !important;
        max-width: none !important;
        padding: 18px !important;
      }

      .nav-wrap {
        right: 18px !important;
        bottom: 18px !important;
      }

      #settings-panel {
        width: min(280px, calc(100vw - 36px)) !important;
      }
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .header-wrap {
        padding-right: 64px !important; /* Space for top-right fixed icon */
      }

      #filter-sidebar {
        position: absolute !important;
        top: 74px !important;
        left: 0 !important;
        right: 0 !important;
        bottom: auto !important;
        transform: none !important;
        flex-direction: row !important;
        align-items: center !important;
        justify-content: flex-start !important;
        gap: 14px !important;
        padding: 6px 14px !important;
        overflow-x: auto !important;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      #filter-sidebar::-webkit-scrollbar {
        display: none;
      }

      #info-panel {
        display: none !important;
      }

      .left-controls {
        position: fixed !important;
        inset: 0 !important;
        top: 0 !important;
        left: 0 !important;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 60 !important;
      }

      #settings-panel {
        pointer-events: auto;
        width: min(300px, calc(100vw - 32px)) !important;
        max-height: 80vh;
        overflow-y: auto;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35) !important;
      }

      /* Centered Mobile Nav Buttons */
      .nav-wrap {
        left: 50% !important;
        right: auto !important;
        transform: translateX(-50%) !important;
        bottom: 24px !important;
        align-items: center !important;
      }
      .nav-wrap > div:first-child {
        display: none !important; /* Hide 'scroll arrows swipe' text */
      }

      /* Minimal Top-Right Settings Icon */
      #toggle-panel-btn {
        position: fixed !important;
        top: 20px !important;
        right: 20px !important;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        z-index: 100 !important;
        padding: 8px !important;
        width: auto !important;
        height: auto !important;
      }
      #toggle-panel-btn svg {
        width: 20px;
        height: 20px;
      }
    }

    @media (max-width: 520px) {
      .header-title {
        font-size: 18px !important;
      }

      .header-wrap {
        padding: 14px !important;
        padding-right: 56px !important;
      }

      #project-count {
        font-size: 11px !important;
      }

      #filter-sidebar {
        top: 64px !important;
      }

      #toggle-panel-btn {
        top: 12px !important;
        right: 12px !important;
      }
    }

    /* Hardware Accelerated Carousel Scene Container */
    #scene-container {
      position: absolute;
      inset: 0;
      perspective: 5000px;
      perspective-origin: 50% 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: perspective-origin 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    #scene-orienter {
      position: relative;
    }

    .card-3d {
      position: absolute;
      left: calc(var(--card-w) / -2);
      top: calc(var(--card-h) / -2);
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease;
      -webkit-transition: -webkit-transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease;
      cursor: pointer;
      will-change: transform, opacity;
    }

    .front-face {
      position: absolute;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    /* The Info Curtain (slides down over the front face on mobile) */
    .card-info-curtain {
      position: absolute;
      inset: 0;
      border-radius: var(--card-radius);
      transform: translateY(-101%);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }
    
    .card-info-curtain.show-curtain {
      transform: translateY(0);
    }

    .right-spine,
    .left-spine,
    .top-spine,
    .bottom-spine {
      position: absolute;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-desc::-webkit-scrollbar,
    .back-desc::-webkit-scrollbar {
      width: 3px;
    }

    .card-desc::-webkit-scrollbar-track,
    .back-desc::-webkit-scrollbar-track {
      background: transparent;
    }

    .card-desc::-webkit-scrollbar-thumb,
    .back-desc::-webkit-scrollbar-thumb {
      background: var(--text-secondary);
      opacity: 0.3;
      border-radius: 10px;
    }

    .card-desc,
    .back-desc {
      scrollbar-width: thin;
      scrollbar-color: var(--text-secondary) transparent;
    }

    /* Fixed input slider behavior for mobile */
    input[type=range] {
      touch-action: none; /* Prevents scrolling panel when dragging slider */
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: var(--accent-primary);
      cursor: pointer;
      margin-top: -6px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      transition: background 0.4s ease;
    }

    input[type=range]::-moz-range-thumb {
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: var(--accent-primary);
      cursor: pointer;
      border: none;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      transition: background 0.4s ease;
    }

    #settings-panel:not(.hidden) {
      animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes driftUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-drift {
      animation: driftUp 0.3s ease-out forwards;
    }
  </style>
</head>

    // Helpers for calculating highlights and shadow tones dynamically
    function darken(h, a) {
      let c = parseInt(h.replace("#", ""), 16);
      return `rgb(${Math.max((c >> 16) - a, 0)}, ${Math.max(((c >> 8) & 0xff) - a, 0)}, ${Math.max((c & 0xff) - a, 0)})`;
    }

    function lighten(h, a) {
      let c = parseInt(h.replace("#", ""), 16);
      return `rgb(${Math.min((c >> 16) + a, 255)}, ${Math.min(((c >> 8) & 0xff) + a, 255)}, ${Math.min((c & 0xff) + a, 255)})`;
    }

    function getProjectColors(project) {
      const theme = THEMES[currentTheme];
      const color = theme.cardColors[project.id % theme.cardColors.length];
      const face = theme.cardFace;
      const accent = lighten(color, 80);
      return {
        color,
        accent,
        face
      };
    }

    function getGeometricPattern(id, c1, c2, c3) {
      const angle = (id * 47) % 180;
      const size = 20 + ((id * 13) % 60);
      return `repeating-linear-gradient(${angle}deg, ${c1} 0%, ${c1} ${size}px, ${c2} ${size}px, ${c2} ${size}px)`;
    }

    // Dynamic state
    let filter = "all";
    let focusIdx = 0;
    let flippedIdx = -1; // Mobile/Desktop active flipped card back
    let shuffleMode = "fan";

      offsetX: 0,
      offsetY: 375,
      yAdjustment: 0,
      radius: 500,
      cardW: 320,
      cardH: 448,
      cardRadius: 12
    };
    const cssVarMap = {
      offsetX: '--offset-x',
      offsetY: '--offset-y',
      radius: '--radius',
      cardW: '--card-w',
      cardH: '--card-h',
      cardRadius: '--card-radius'
    };

    // LOCAL STORAGE FUNCTIONS
    const STORAGE_KEY = 'cristobal_archive_prefs';

    function savePreferences() {
      const prefs = {
        offsetX: layout.offsetX,
        yAdjustment: layout.yAdjustment,
        radius: layout.radius,
        cardW: layout.cardW,
        cardRadius: layout.cardRadius,
        shuffleMode: shuffleMode,
        currentTheme: currentTheme
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(prefs));
    }

    function loadPreferences() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const prefs = JSON.parse(saved);
          if (prefs.offsetX !== undefined) layout.offsetX = prefs.offsetX;
          if (prefs.yAdjustment !== undefined) layout.yAdjustment = prefs.yAdjustment;
          if (prefs.radius !== undefined) layout.radius = prefs.radius;
          if (prefs.cardW !== undefined) {
            layout.cardW = prefs.cardW;
            layout.cardH = Math.round(layout.cardW * 1.4);
          }
          if (prefs.cardRadius !== undefined) layout.cardRadius = prefs.cardRadius;
          if (prefs.shuffleMode) shuffleMode = prefs.shuffleMode;
          if (prefs.currentTheme) currentTheme = prefs.currentTheme;
        } catch (e) {
          console.error("Failed to parse saved preferences", e);
        }
      }
    }

    // DOM Elements Cache
    const sceneOrienter = document.getElementById("scene-orienter");
    const projectCountEl = document.getElementById("project-count");
    const filterSidebar = document.getElementById("filter-sidebar");
    const infoPanel = document.getElementById("info-panel");
    const togglePanelBtn = document.getElementById("toggle-panel-btn");
    const settingsPanel = document.getElementById("settings-panel");
    const closePanelBtn = document.getElementById("close-panel-btn");
    const resetBtn = document.getElementById("reset-btn");

    function isMobile() {
      return window.innerWidth <= 768;
    }

    function updateThemeStyles() {
      const t = THEMES[currentTheme];
      document.documentElement.style.setProperty('--bg-solid', t.bgSolid);
      document.documentElement.style.setProperty('--text-primary', t.textPrimary);
      document.documentElement.style.setProperty('--text-secondary', t.textSecondary);
      document.documentElement.style.setProperty('--panel-bg', t.panelBg);
      document.documentElement.style.setProperty('--panel-border', t.panelBorder);
      document.documentElement.style.setProperty('--accent-primary', t.accentPrimary);
      document.documentElement.style.setProperty('--shadow-color', t.shadowColor);
    }

    function updateDynamicOffsets() {
      const angleRad = 81 * Math.PI / 180;
      let activeCardZ = 0;
      if (shuffleMode === "circular") {
        activeCardZ = layout.radius + 40;
      } else if (shuffleMode === "deck") {
        activeCardZ = 60;
      } else if (shuffleMode === "fan") {
        activeCardZ = 40;
      }
      const projectedY = activeCardZ * Math.sin(angleRad);
      layout.offsetY = Math.round(projectedY + layout.yAdjustment);
      document.documentElement.style.setProperty('--offset-y', layout.offsetY + 'px');
    }

    function getResponsiveCardWidth() {
      const w = window.innerWidth;
      if (w <= 380) return 270;
      if (w <= 520) return 300;
      if (w <= 768) return 320;
      if (w <= 900) return 320;
      return 320;
    }

    function applyResponsiveCardWidth() {
      const target = getResponsiveCardWidth();
      if (layout.cardW !== target) {
        updateLayoutProp("cardW", target);
        const cardWSlider = document.getElementById("slider-cardW");
        const cardWValText = document.getElementById("val-cardW");
        if (cardWSlider && cardWValText) {
          cardWSlider.value = target;
          cardWValText.textContent = `${target}px`;
        }
      }
    }

    // Settings panel toggle
    togglePanelBtn.addEventListener("click", () => {
      settingsPanel.classList.toggle("hidden");
    });
    closePanelBtn.addEventListener("click", () => {
      settingsPanel.classList.add("hidden");
    });

    // Reset layout attributes
    resetBtn.addEventListener("click", () => {
      updateLayoutProp("offsetX", 0);
      updateLayoutProp("yAdjustment", 0);
      updateLayoutProp("radius", 500);
      updateLayoutProp("cardRadius", 12);
      
      const targetW = getResponsiveCardWidth();
      updateLayoutProp("cardW", targetW);

      setShuffleMode("fan");
      applyTheme("solar");
      syncSlidersToState();
      savePreferences();
    });

    // Set Theme
    function applyTheme(key) {
      currentTheme = key;
      updateThemeStyles();
      Object.keys(THEMES).forEach(k => {
        const btn = document.getElementById(`theme-${k}`);
        if (!btn) return;
        if (k === key) {
          const t = THEMES[k];
          btn.className = `text-[9px] font-bold py-1 px-2.5 rounded-lg transition-all ${t.activeBg} shadow-sm`;
        } else {
          btn.className = "text-[9px] font-semibold py-1 px-2.5 rounded-lg transition-all text-slate-500 hover:text-slate-800 dark:hover:text-white";
        }
      });
      rebuildCardsDOM();
      savePreferences();
    }
    Object.keys(THEMES).forEach(key => {
      const btn = document.getElementById(`theme-${key}`);
      if (btn) {
        btn.addEventListener("click", () => applyTheme(key));
      }
    });

    // Layout Mode Shuffling
    function setShuffleMode(mode) {
      shuffleMode = mode;
      ["circular", "deck", "fan"].forEach(m => {
        const btn = document.getElementById(`layout-${m}`);
        if (m === mode) {
          btn.className = "text-[10px] font-semibold py-1.5 rounded-lg transition-all bg-white text-slate-800 shadow-sm";
        } else {
          btn.className = "text-[10px] font-semibold py-1.5 rounded-lg transition-all text-slate-600 hover:text-slate-900";
        }
      });
      renderActiveCards();
      savePreferences();
    }
    ["circular", "deck", "fan"].forEach(mode => {
      document.getElementById(`layout-${mode}`).addEventListener("click", () => setShuffleMode(mode));
    });

    // Slider inputs mapping
    ["offsetX", "yAdjustment", "radius", "cardW", "cardRadius"].forEach(prop => {
      const slider = document.getElementById(`slider-${prop}`);
      const valText = document.getElementById(`val-${prop}`);
      
      // Handle native dynamic updating logic while dragging
      slider.addEventListener("input", (e) => {
        const val = parseFloat(e.target.value);
        updateLayoutProp(prop, val);
        valText.textContent = `${val}px`;
      });

      // Stop touch drag from cascading to underlying panel swipe handlers
      slider.addEventListener("touchstart", (e) => e.stopPropagation(), {passive: true});
      slider.addEventListener("touchmove", (e) => e.stopPropagation(), {passive: true});
    });

    function updateLayoutProp(prop, value) {
      layout[prop] = value;
      if (prop === "cardW") {
        layout.cardH = Math.round(value * 1.4);
        document.documentElement.style.setProperty('--card-w', layout.cardW + 'px');
        document.documentElement.style.setProperty('--card-h', layout.cardH + 'px');
      } else if (prop === "yAdjustment") {
        updateDynamicOffsets();
      } else {
        const cssVar = cssVarMap[prop] || `--${prop.toLowerCase()}`;
        document.documentElement.style.setProperty(cssVar, value + 'px');
      }
      renderActiveCards();
      savePreferences();
    }

    function syncSlidersToState() {
      ["offsetX", "yAdjustment", "radius", "cardW", "cardRadius"].forEach(prop => {
        const slider = document.getElementById(`slider-${prop}`);
        const valText = document.getElementById(`val-${prop}`);
        slider.value = layout[prop];
        valText.textContent = `${layout[prop]}px`;
      });
    }

    function getFilteredItems() {
      return filter === "all" ? PROJECTS : PROJECTS.filter(p => p.category === filter);
    }

    function getCategoryCounts() {
      const counts = {
        all: PROJECTS.length
      };
      PROJECTS.forEach(p => {
        counts[p.category] = (counts[p.category] || 0) + 1;
      });
      return counts;
    }

    function renderCategoryFilters() {
      filterSidebar.innerHTML = "";
      const counts = getCategoryCounts();
      CATEGORIES.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = `flex items-baseline gap-1.5 cursor-pointer border-none bg-none transition-all duration-300 py-1 shrink-0 ${
          filter === cat.key ? "opacity-100 font-bold" : "opacity-35 hover:opacity-75"
        }`;
        btn.innerHTML = `
          <span style="font-size: ${filter === cat.key ? '18px' : '14px'}; color: var(--text-primary); transition: all 0.3s ease;">${cat.label}</span>
          <sup class="text-[11px] font-mono font-normal" style="color: var(--text-secondary);">${counts[cat.key] || 0}</sup>
        `;
        btn.addEventListener("click", () => {
          filter = cat.key;
          focusIdx = 0;
          flippedIdx = -1;
          renderCategoryFilters();
          rebuildCardsDOM();
        });
        filterSidebar.appendChild(btn);
      });
    }

        topSpine.style.transform = "translateX(-0.25px) translateY(-0.5px) rotateX(90deg)";
        topSpine.style.transformOrigin = "center top";
        topSpine.style.background = `linear-gradient(90deg, ${lighten(color, 30)}, ${lighten(color, 40)}, ${lighten(color, 25)})`;
        card.appendChild(topSpine);

        const bottomSpine = document.createElement("div");
        bottomSpine.className = "bottom-spine";
        bottomSpine.style.left = "var(--card-radius)";
        bottomSpine.style.width = "calc(var(--card-w) - (2 * var(--card-radius)))";
        bottomSpine.style.height = "calc(var(--depth) + 0.5px)";
        bottomSpine.style.transform = "translateX(-0.25px) translateY(var(--card-h)) rotateX(-90deg)";
        bottomSpine.style.transformOrigin = "center top";
        bottomSpine.style.background = darken(color, 25);
        card.appendChild(bottomSpine);

        card.addEventListener("click", () => {
          // On mobile, tapping the focused card triggers the curtain.
          if (i === focusIdx && isMobile()) {
            flippedIdx = (flippedIdx === i) ? -1 : i;
          } else {
            focusIdx = i;
            flippedIdx = -1;
          }
          renderActiveCards();
        });
        sceneOrienter.appendChild(card);
      });
      renderActiveCards();
    }

    function renderActiveCards() {
      const items = getFilteredItems();
      const n = items.length;
      if (n === 0) {
        infoPanel.classList.add("hidden");
        return;
      }
      updateThemeStyles();
      updateDynamicOffsets();

      const ts = Math.min(layout.cardW / 200, layout.cardH / 280);
      document.documentElement.style.setProperty('--ts', ts);
      const isDarkFace = THEMES[currentTheme].darkFace;
      const cards = document.querySelectorAll(".card-3d");

      cards.forEach((card, i) => {
        const project = items[i];
        if (!project) return;
        const { color } = getProjectColors(project);
        let diff = i - focusIdx;
        if (diff > n / 2) diff -= n;
        if (diff < -n / 2) diff += n;

        const isFront = i === focusIdx;
        const isFlipped = isFront && flippedIdx === i;

        let x, z, rx, rz;
        let cardScale = isFront ? 1 : 0.85;
        let normZ;

        if (shuffleMode === "circular") {
          const angleStep = (2 * Math.PI) / n;
          const angle = angleStep * (i - focusIdx);
          x = Math.sin(angle) * layout.radius;
          z = Math.cos(angle) * layout.radius;
          normZ = (z + layout.radius) / (2 * layout.radius);
          const popOutZ = isFront ? 40 : 0;
          z += popOutZ;
          rx = 'var(--card-rx)';
          rz = 'var(--card-rz)';
        } else if (shuffleMode === "deck") {
          const step = Math.abs(diff);
          x = diff * 2.5;
          z = isFront ? 60 : (-step * 9);
          normZ = isFront ? 1 : (1 - (step / n));
          rx = 'var(--card-rx)';
          rz = `calc(var(--card-rz) + ${diff * 1}deg)`;
        } else if (shuffleMode === "fan") {
          const fanAngle = diff * 0.16;
          const fanRadius = layout.radius * 0.95;
          x = Math.sin(fanAngle) * fanRadius;
          z = (Math.cos(fanAngle) - 1) * fanRadius + (isFront ? 40 : 0);
          normZ = isFront ? 1 : (1 - (Math.abs(diff) / n));
          rx = 'var(--card-rx)';
          rz = `calc(var(--card-rz) + ${diff * 5.5}deg)`;
        }

        card.style.zIndex = isFront ? 1000 : Math.round(normZ * 100);
        card.style.opacity = 0.3 + normZ * 0.7;

        // Normal 3D carousel presentation styling is always maintained
        card.style.transform = `
          translateX(var(--offset-x))
          translateY(var(--offset-y))
          rotateX(var(--scene-rx))
          rotateZ(var(--scene-rz))
          scale(var(--zoom))
          translateX(${x}px)
          translateZ(${z}px)
          rotateX(${rx})
          rotateY(var(--card-ry))
          rotateZ(${rz})
          scale(${cardScale})
        `;

        // Toggle Curtain Overlay
        const curtainOverlay = card.querySelector(".card-info-curtain");
        if (curtainOverlay) {
          if (isFlipped) {
            curtainOverlay.classList.add("show-curtain");
          } else {
            curtainOverlay.classList.remove("show-curtain");
          }
        }

        const textLayer = card.querySelector(".text-layer");
        if (textLayer) {
          const categoryText = textLayer.querySelector(".card-category-text");
          const yearText = textLayer.querySelector(".card-year-text");
          const titleText = textLayer.querySelector(".card-title-text");
          const descText = textLayer.querySelector(".card-desc-text");
          if (categoryText) {
            categoryText.style.color = isDarkFace ? lighten(color, 110) : color;
          }
          if (yearText) {
            yearText.style.color = isDarkFace ? "rgba(255, 255, 255, 0.6)" : "var(--text-secondary)";
          }
          if (titleText) {
            titleText.style.color = isDarkFace ? "#ffffff" : "var(--text-primary)";
          }
          if (descText) {
            descText.style.color = isDarkFace ? "rgba(255, 255, 255, 0.85)" : "var(--text-secondary)";
          }
        }

        const frontBoxShadow = card.querySelector(".front-face");
        if (frontBoxShadow) {
          frontBoxShadow.style.boxShadow = isFront ?
            `0 20px 40px ${color}33, 0 8px 16px ${color}1a` :
            "0 4px 12px rgba(0,0,0,0.03)";
        }

        const descText = card.querySelector(".card-desc");
        const techBox = card.querySelector(".card-tech");
        const titleText = card.querySelector(".card-title-clamp");

        if (descText) descText.style.display = (layout.cardH >= 150 && isFront) ? "block" : "none";
        if (techBox) {
          techBox.style.display = (layout.cardH >= 170 && isFront) ? "flex" : "none";
          if (isFront) {
            techBox.innerHTML = "";
            project.tech.forEach(t => {
              const badge = document.createElement("span");
              badge.className = "font-mono font-semibold uppercase truncate rounded transition-colors duration-500";
              badge.style.fontSize = "max(6px, calc(7.5px * var(--ts)))";
              badge.style.padding = "calc(2px * var(--ts)) calc(6px * var(--ts))";
              badge.style.background = isDarkFace ? `${color}40` : `${color}15`;
              badge.style.color = isDarkFace ? lighten(color, 120) : darken(color, 15);
              badge.textContent = t;
              techBox.appendChild(badge);
            });
          }
        }
        if (titleText) titleText.style.webkitLineClamp = (layout.cardH >= 200) ? "3" : "2";
      });

      // Update Info Panel
      const fp = items[focusIdx];
      if (fp) {
        const {
          color: fpColor
        } = getProjectColors(fp);
        infoPanel.classList.remove("hidden");
        infoPanel.classList.remove("animate-drift");
        void infoPanel.offsetWidth;
        infoPanel.classList.add("animate-drift");
        document.getElementById("info-category-year").textContent = `${fp.category} · ${fp.year}`;
        document.getElementById("info-title").textContent = fp.title;
        document.getElementById("info-desc").textContent = fp.description;
        const techContainer = document.getElementById("info-tech");
        techContainer.innerHTML = "";
        fp.tech.forEach(t => {
          const span = document.createElement("span");
          span.className = "text-[10px] font-mono font-semibold uppercase px-2.5 py-1 rounded-md transition-colors duration-500";
          span.style.background = "rgba(0,0,0,0.05)";
          span.style.color = "var(--text-primary)";
          span.textContent = t;
          techContainer.appendChild(span);
        });
        const infoLink = document.getElementById("info-link");
        if (fp.link && fp.link !== "#") {
          infoLink.href = fp.link;
          infoLink.style.display = "flex";
          infoLink.style.background = fpColor;
          infoLink.style.boxShadow = `0 4px 14px ${fpColor}40`;
        } else {
          infoLink.style.display = "none";
        }
        document.getElementById("info-pagination").textContent = `${String(focusIdx + 1).padStart(2, "0")} / ${String(items.length).padStart(2, "0")}`;
      } else {
        infoPanel.classList.add("hidden");
      }
    }

    // Navigation buttons
    document.getElementById("prev-btn").addEventListener("click", () => {
      const items = getFilteredItems();
      focusIdx = (focusIdx - 1 + items.length) % items.length;
      flippedIdx = -1;
      renderActiveCards();
    });
    document.getElementById("next-btn").addEventListener("click", () => {
      const items = getFilteredItems();
      focusIdx = (focusIdx + 1) % items.length;
      flippedIdx = -1;
      renderActiveCards();
    });

    // Throttled mousewheel navigation
    let lastTime = 0;
    window.addEventListener("wheel", (e) => {
      if (e.target.closest('#settings-panel') || e.target.closest('#info-panel')) return;
      e.preventDefault();
      const now = Date.now();
      if (now - lastTime < 80) return;
      lastTime = now;
      const items = getFilteredItems();
      if (e.deltaY > 0 || e.deltaX > 0) {
        focusIdx = (focusIdx + 1) % items.length;
      } else {
        focusIdx = (focusIdx - 1 + items.length) % items.length;
      }
      flippedIdx = -1;
      renderActiveCards();
    }, {
      passive: false
    });

    // Keyboard handlers
    window.addEventListener("keydown", (e) => {
      const items = getFilteredItems();
      if (e.key === "ArrowRight" || e.key === "ArrowDown") {
        e.preventDefault();
        focusIdx = (focusIdx + 1) % items.length;
        flippedIdx = -1;
        renderActiveCards();
      } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
        e.preventDefault();
        focusIdx = (focusIdx - 1 + items.length) % items.length;
        flippedIdx = -1;
        renderActiveCards();
      }
    });

    // Touch swiping navigation
    let touchStartX = 0;
    window.addEventListener("touchstart", (e) => {
      if (e.target.closest('#settings-panel') || e.target.closest('#info-panel') || e.target.closest('#filter-sidebar')) return;
      touchStartX = e.touches[0].clientX;
    });
    window.addEventListener("touchend", (e) => {
      if (e.target.closest('#settings-panel') || e.target.closest('#info-panel') || e.target.closest('#filter-sidebar')) return;
      const items = getFilteredItems();
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) {
        if (diff > 0) {
          focusIdx = (focusIdx + 1) % items.length;
        } else {
          focusIdx = (focusIdx - 1 + items.length) % items.length;
        }
        flippedIdx = -1;
        renderActiveCards();
      }
    });

    // Handle screen resize events dynamically
    let resizeTimer = null;
    window.addEventListener("resize", () => {
      updateDynamicOffsets();
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        applyResponsiveCardWidth();
        if (!isMobile()) flippedIdx = -1;
        renderActiveCards();
      }, 150);
    });

    // Initialize
    document.addEventListener("DOMContentLoaded", () => {
      document.documentElement.style.setProperty(`--offset-x`, "0px");
      document.documentElement.style.setProperty(`--radius`, "500px");
      document.documentElement.style.setProperty(`--card-radius`, "12px");

      // Set initial defaults
      layout.cardW = getResponsiveCardWidth();
      layout.cardH = Math.round(layout.cardW * 1.4);

      // Load saved preferences if available (this overrides the above defaults)
      loadPreferences();

      // Apply loaded or default properties to CSS
      document.documentElement.style.setProperty('--card-w', layout.cardW + 'px');
      document.documentElement.style.setProperty('--card-h', layout.cardH + 'px');
      document.documentElement.style.setProperty('--offset-x', layout.offsetX + 'px');
      document.documentElement.style.setProperty('--radius', layout.radius + 'px');
      document.documentElement.style.setProperty('--card-radius', layout.cardRadius + 'px');

      applyTheme(currentTheme);
      setShuffleMode(shuffleMode);
      syncSlidersToState();
      renderCategoryFilters();
      rebuildCardsDOM();
    });
  </script>
</body>

</html>
